<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background matching site theme -->
  <rect width="32" height="32" fill="#0A0E1A"/>

  <!-- Hull: horizontal ellipse -->
  <ellipse cx="16" cy="20" rx="12" ry="5.5" fill="#1e3a5f"/>

  <!-- Conning tower -->
  <rect x="11" y="9" width="6" height="7" rx="2" fill="#1e3a5f"/>

  <!-- Periscope -->
  <rect x="13" y="5" width="2" height="5" rx="1" fill="#1e3a5f"/>

  <!-- Observation window (accent cyan) -->
  <circle cx="23" cy="19.5" r="2" fill="#22D3EE"/>

  <!-- Propeller blades -->
  <line x1="4" y1="16" x2="2" y2="14" stroke="#1e3a5f" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="20" x2="1.5" y2="20" stroke="#1e3a5f" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4" y1="24" x2="2" y2="26" stroke="#1e3a5f" stroke-width="1.5" stroke-linecap="round"/>
</svg>
